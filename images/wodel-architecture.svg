<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 640" font-family="'Open Sans', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#546e7a"/>
    </marker>
  </defs>

  <!-- ======================= Layer 1: Eclipse IDE (vivid blue) ======================= -->
  <rect x="20" y="20" width="640" height="150" rx="10" fill="#e8f1fb" stroke="#90b8e0"/>
  <text x="340" y="46" text-anchor="middle" font-size="15" font-weight="bold" fill="#1565c0">Eclipse IDE &#8212; Wodel development environment</text>

  <rect x="36" y="62" width="146" height="92" rx="7" fill="#ffffff" stroke="#90b8e0"/>
  <text x="109" y="88" text-anchor="middle" font-size="12" font-weight="bold" fill="#1565c0">Xtext editor</text>
  <text x="109" y="106" text-anchor="middle" font-size="10.5" fill="#455a64">highlighting,</text>
  <text x="109" y="120" text-anchor="middle" font-size="10.5" fill="#455a64">completion,</text>
  <text x="109" y="134" text-anchor="middle" font-size="10.5" fill="#455a64">validation</text>

  <rect x="194" y="62" width="146" height="92" rx="7" fill="#ffffff" stroke="#90b8e0"/>
  <text x="267" y="88" text-anchor="middle" font-size="12" font-weight="bold" fill="#1565c0">Project &amp; seed</text>
  <text x="267" y="104" text-anchor="middle" font-size="12" font-weight="bold" fill="#1565c0">wizards</text>
  <text x="267" y="124" text-anchor="middle" font-size="10.5" fill="#455a64">guided creation</text>

  <rect x="352" y="62" width="146" height="92" rx="7" fill="#ffffff" stroke="#90b8e0"/>
  <text x="425" y="88" text-anchor="middle" font-size="12" font-weight="bold" fill="#1565c0">Footprint views</text>
  <text x="425" y="108" text-anchor="middle" font-size="10.5" fill="#455a64">static &amp; dynamic</text>
  <text x="425" y="122" text-anchor="middle" font-size="10.5" fill="#455a64">metrics</text>

  <rect x="510" y="62" width="134" height="92" rx="7" fill="#ffffff" stroke="#90b8e0"/>
  <text x="577" y="88" text-anchor="middle" font-size="12" font-weight="bold" fill="#1565c0">Preferences</text>
  <text x="577" y="108" text-anchor="middle" font-size="10.5" fill="#455a64">general, footprints,</text>
  <text x="577" y="122" text-anchor="middle" font-size="10.5" fill="#455a64">seed synthesis</text>

  <!-- arrow IDE -> engine -->
  <line x1="340" y1="170" x2="340" y2="198" stroke="#546e7a" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ======================= Layer 2: Wodel engine (vivid teal) ======================= -->
  <rect x="20" y="202" width="640" height="216" rx="10" fill="#ffffff" stroke="#00897b" stroke-width="1.5"/>
  <path d="M 30 202 L 650 202 Q 660 202 660 212 L 660 236 L 20 236 L 20 212 Q 20 202 30 202 Z" fill="#00897b"/>
  <text x="340" y="225" text-anchor="middle" font-size="15" font-weight="bold" fill="#ffffff">Wodel engine</text>

  <rect x="36" y="250" width="196" height="72" rx="7" fill="#e6f4f2" stroke="#7fc7bf"/>
  <text x="134" y="274" text-anchor="middle" font-size="12" font-weight="bold" fill="#00695c">Compiler</text>
  <text x="134" y="292" text-anchor="middle" font-size="10.5" fill="#455a64">Wodel program &#8594; Java</text>
  <text x="134" y="306" text-anchor="middle" font-size="10.5" fill="#455a64">code generation</text>

  <rect x="242" y="250" width="196" height="72" rx="7" fill="#e6f4f2" stroke="#7fc7bf"/>
  <text x="340" y="274" text-anchor="middle" font-size="12" font-weight="bold" fill="#00695c">Mutation engine</text>
  <text x="340" y="292" text-anchor="middle" font-size="10.5" fill="#455a64">nine mutation primitives,</text>
  <text x="340" y="306" text-anchor="middle" font-size="10.5" fill="#455a64">blocks and scheduling</text>

  <rect x="448" y="250" width="196" height="72" rx="7" fill="#e6f4f2" stroke="#7fc7bf"/>
  <text x="546" y="274" text-anchor="middle" font-size="12" font-weight="bold" fill="#00695c">Validation</text>
  <text x="546" y="292" text-anchor="middle" font-size="10.5" fill="#455a64">meta-model conformance</text>
  <text x="546" y="306" text-anchor="middle" font-size="10.5" fill="#455a64">and OCL constraints</text>

  <rect x="36" y="334" width="196" height="72" rx="7" fill="#e6f4f2" stroke="#7fc7bf"/>
  <text x="134" y="358" text-anchor="middle" font-size="12" font-weight="bold" fill="#00695c">Duplicate detection</text>
  <text x="134" y="376" text-anchor="middle" font-size="10.5" fill="#455a64">syntactic and pluggable</text>
  <text x="134" y="390" text-anchor="middle" font-size="10.5" fill="#455a64">semantic comparison</text>

  <rect x="242" y="334" width="196" height="72" rx="7" fill="#e6f4f2" stroke="#7fc7bf"/>
  <text x="340" y="358" text-anchor="middle" font-size="12" font-weight="bold" fill="#00695c">Mutation registry</text>
  <text x="340" y="376" text-anchor="middle" font-size="10.5" fill="#455a64">records applied mutations,</text>
  <text x="340" y="390" text-anchor="middle" font-size="10.5" fill="#455a64">feeds footprints &amp; metrics</text>

  <rect x="448" y="334" width="196" height="72" rx="7" fill="#e6f4f2" stroke="#7fc7bf"/>
  <text x="546" y="358" text-anchor="middle" font-size="12" font-weight="bold" fill="#00695c">Seed synthesiser</text>
  <text x="546" y="376" text-anchor="middle" font-size="10.5" fill="#455a64">automatic generation</text>
  <text x="546" y="390" text-anchor="middle" font-size="10.5" fill="#455a64">of seed models</text>

  <!-- arrow engine -> EMF -->
  <line x1="340" y1="418" x2="340" y2="446" stroke="#546e7a" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ======================= Layer 3: EMF modelling layer (vivid amber) ======================= -->
  <rect x="20" y="450" width="640" height="170" rx="10" fill="#fdf3e3" stroke="#e6b566"/>
  <text x="340" y="476" text-anchor="middle" font-size="15" font-weight="bold" fill="#e65100">EMF modelling layer</text>

  <rect x="36" y="494" width="180" height="102" rx="7" fill="#ffffff" stroke="#e6b566"/>
  <text x="126" y="536" text-anchor="middle" font-size="12" font-weight="bold" fill="#e65100">Domain</text>
  <text x="126" y="552" text-anchor="middle" font-size="12" font-weight="bold" fill="#e65100">meta-model</text>
  <text x="126" y="572" text-anchor="middle" font-size="10.5" fill="#455a64">any Ecore meta-model</text>

  <rect x="240" y="494" width="170" height="102" rx="7" fill="#ffffff" stroke="#e6b566"/>
  <text x="325" y="536" text-anchor="middle" font-size="12" font-weight="bold" fill="#e65100">Seed models</text>
  <text x="325" y="556" text-anchor="middle" font-size="10.5" fill="#455a64">provided by the user</text>
  <text x="325" y="570" text-anchor="middle" font-size="10.5" fill="#455a64">or synthesised</text>

  <line x1="410" y1="545" x2="466" y2="545" stroke="#546e7a" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="470" y="494" width="174" height="102" rx="7" fill="#fdece8" stroke="#d84315" stroke-width="1.5"/>
  <text x="557" y="536" text-anchor="middle" font-size="12" font-weight="bold" fill="#d84315">Valid mutants</text>
  <text x="557" y="556" text-anchor="middle" font-size="10.5" fill="#455a64">+ registry of the</text>
  <text x="557" y="570" text-anchor="middle" font-size="10.5" fill="#455a64">applied mutations</text>

  <!-- ======================= Extensions column (vivid green) ======================= -->
  <rect x="692" y="202" width="228" height="418" rx="10" fill="#eef7ee" stroke="#8fc491"/>
  <text x="806" y="230" text-anchor="middle" font-size="14" font-weight="bold" fill="#2e7d32">Extension points</text>
  <text x="806" y="248" text-anchor="middle" font-size="11" fill="#455a64">post-processors</text>

  <line x1="660" y1="310" x2="688" y2="310" stroke="#546e7a" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="708" y="268" width="196" height="86" rx="7" fill="#ffffff" stroke="#8fc491"/>
  <text x="806" y="296" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#2e7d32">Wodel-EDU</text>
  <text x="806" y="316" text-anchor="middle" font-size="10.5" fill="#455a64">automated generation of</text>
  <text x="806" y="330" text-anchor="middle" font-size="10.5" fill="#455a64">diagram-based exercises</text>

  <rect x="708" y="372" width="196" height="86" rx="7" fill="#ffffff" stroke="#8fc491"/>
  <text x="806" y="400" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#2e7d32">Wodel-Test</text>
  <text x="806" y="420" text-anchor="middle" font-size="10.5" fill="#455a64">mutation-testing tools for</text>
  <text x="806" y="434" text-anchor="middle" font-size="10.5" fill="#455a64">modelling &amp; programming</text>

  <rect x="708" y="476" width="196" height="86" rx="7" fill="#ffffff" stroke="#8fc491"/>
  <text x="806" y="504" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#2e7d32">Wodel4diac</text>
  <text x="806" y="524" text-anchor="middle" font-size="10.5" fill="#455a64">mutation of IEC 61499</text>
  <text x="806" y="538" text-anchor="middle" font-size="10.5" fill="#455a64">industrial applications</text>
</svg>
